<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | Recruiting portal</title>
  <link rel="stylesheet" href="assets/portal.css">
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-accent-bar"></div>
    <div class="login-card">
      <h1>Recruiting portal</h1>
      <p class="hint">One shared password for the whole hiring team until your backend issues individual sessions.</p>
      <form id="portal-login-form" style="margin-top:1.5rem;">
        <label class="field" for="pw">Team password</label>
        <input type="password" id="pw" name="password" autocomplete="current-password" required placeholder="Enter password">
        <p class="field-hint">Demo password: <code style="background:var(--bg-subtle);padding:2px 6px;border-radius:4px;">portal-demo</code></p>
        <button type="submit" class="btn btn-primary">Sign in</button>
        <div id="login-err" class="login-error">That password isn&apos;t right. Try again or ask your admin.</div>
      </form>
      <p class="login-meta">Applicants never see this page — traffic stays on the public careers site.</p>
    </div>
  </div>

  <script src="assets/portal.js"></script>
  <script>
    if (PortalAuth.isAuthed()) window.location.href = 'dashboard.html';

    document.getElementById('portal-login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      var err = document.getElementById('login-err');

      if (PortalAuth.verifyDemoPassword(pw)) {
        err.classList.remove('is-visible');
        PortalAuth.login();
        window.location.href = 'dashboard.html';
      } else err.classList.add('is-visible');
    });
  </script>
</body>
</html>
